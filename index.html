    var SS = "aigo_pass";

    var body  = document.body;
    var lock  = document.getElementById("lock");
    var form  = document.getElementById("lock-form");
    var input = document.getElementById("lock-input");
    var msg   = document.getElementById("lock-msg");
    var inner = lock.querySelector(".lock-inner");
    var boot  = document.getElementById("lock-boot");

    function b64d(s) {
      var bin = atob(s), u = new Uint8Array(bin.length);
      for (var i = 0; i < bin.length; i++) u[i] = bin.charCodeAt(i);
      return u;
    }

    function decrypt(pass) {
      var enc = new TextEncoder();
      return crypto.subtle
        .importKey("raw", enc.encode(pass), "PBKDF2", false, ["deriveKey"])
        .then(function (km) {
          return crypto.subtle.deriveKey(
            { name: "PBKDF2", salt: b64d(PAYLOAD.salt), iterations: PAYLOAD.iter, hash: "SHA-256" },
            km, { name: "AES-GCM", length: 256 }, false, ["decrypt"]);
        })
        .then(function (key) {
          return crypto.subtle.decrypt({ name: "AES-GCM", iv: b64d(PAYLOAD.iv) }, key, b64d(PAYLOAD.ct));
        })
        .then(function (buf) { return new TextDecoder().decode(buf); }); // rejects on wrong passcode
    }

    function render(html) {
      try { document.open(); document.write(html); document.close(); }
      catch (e) { location.reload(); }
    }

    function deny(text) {
      msg.textContent = text || "ACCESS DENIED";
      msg.className = "lock-msg err";
      inner.classList.remove("lock-deny"); void inner.offsetWidth; inner.classList.add("lock-deny");
      input.value = ""; try { input.focus(); } catch (e) {}
    }

    function grant(html, pass) {
      try { sessionStorage.setItem(SS, pass); } catch (e) {}
      msg.textContent = "ACCESS GRANTED";
      msg.className = "lock-msg ok";
      if (boot) {
        ["AUTHORIZING…", "REAL-TIME CORE · ONLINE", "OPENING THE VAULT"].forEach(function (l, i) {
          setTimeout(function () { boot.innerHTML += (i ? "<br>" : "") + l; }, 200 + i * 240);
        });
      }
      var reduce = window.matchMedia && window.matchMedia("(prefers-reduced-motion: reduce)").matches;
      lock.classList.add("unlocked");
      setTimeout(function () { render(html); }, reduce ? 80 : 1150);
    }

    if (!(window.crypto && window.crypto.subtle)) {
      setTimeout(function () { deny("SECURE CONTEXT REQUIRED (HTTPS)"); }, 60);
      return;
    }

    // auto-unlock if already authorized this browser session
    try {
      var saved = sessionStorage.getItem(SS);
      if (saved) {
        decrypt(saved).then(function (html) { body.classList.remove("locked"); render(html); })
                      .catch(function () { try { sessionStorage.removeItem(SS); } catch (e) {} });
      }
    } catch (e) {}

    setTimeout(function () { try { input.focus(); } catch (e) {} }, 450);

    form.addEventListener("submit", function (e) {
      e.preventDefault();
      var val = (input.value || "").trim();
      if (!val) return;
      msg.textContent = ""; msg.className = "lock-msg";
      decrypt(val).then(function (html) { grant(html, val); })
                  .catch(function () { deny(); });
    });
  })();
  </script>
